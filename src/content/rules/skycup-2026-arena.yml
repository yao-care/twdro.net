chapter: 場地規範
article_number: 九
title: 比賽場地與球門規格
summary: 比賽場地為長 6 公尺、寬 3 公尺、高 3 公尺，四周以安全保護網圍繞。球門設於距窄邊 1 公尺處，球門底端離地面高度 2.4 公尺，供得分手穿越得分。球員操作區位於飛行區短邊兩側，以保護網與飛行區隔開，選手在此區域操控飛球。每隊起始區位於己方半場內、距窄邊 1 公尺，尺寸為 1 公尺乘 1.5 公尺，選手須從起始區起飛開始比賽。
