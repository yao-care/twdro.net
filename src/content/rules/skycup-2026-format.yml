rulebook: skycup-2026
chapter: 比賽方式
title: 賽制與局間規定
summary: 每局為 3 分鐘，局與局之間間隔 3 分鐘，可進行賽前整修與戰術討論。初賽採單場決勝負制，複賽起改為三戰兩勝制，勝隊晉級直到確定前三名，賽制得依實際報名組數調整。比賽開始前與結束時皆有提醒，並在結束前 10 秒再次提醒。賽前由兩隊猜拳選擇操作區，開賽後不得更改。得分後全隊須一起回到己方半場，才能再次進攻得分。若報名隊數超過預定範圍，當天正式比賽前會加辦資格賽，每隊派一員進行 1 分鐘刷分賽，須回半場、無防守、以繞圈循環方式得分，得分高者晉級正式比賽。
