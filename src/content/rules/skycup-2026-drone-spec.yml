chapter: 球機規格
article_number: 八
title: 參賽飛球規格（有刷組）
summary: 參賽隊伍須自備無人機飛球。有刷組飛球外型直徑 20 至 22 公分，起飛重量 110 公克以下，電池為 2S、8.5V 以下，馬達採 1020 有刷馬達。遙控須使用 2.4 GHz 頻率，並配備失效保護裝置以確保飛行安全，遙控器功率須調至 25mW 以下，每次開賽前由裁判確認。各隊最慢須於開賽前 15 分鐘內完成查檢手續，經工作人員查檢符合規範才可參賽。
