rulebook: skycup-2026
chapter: 得分與犯規
title: 得分規則與犯規處分
summary: 僅得分手可將飛球穿越對方球門得分，違者記違規 1 點。比賽開始前搶先起飛者記違規 1 點並重新開始。掩護手禁止將飛球懸停在己方球門內超過 3 秒，違者記違規 1 點；掩護手僅可從側邊及球門前方進行干擾、撞擊或阻擋敵隊得分手，嚴禁從相反方向穿越己方球門進行撞擊阻擋，違者記違規 1 點。得分後全隊未回到己方半場、得分手即再次穿越敵隊球門者，該得分無效並記違規 1 點。違規累積滿 2 點扣總分 1 分，累積至 4 點再扣 1 分，以此類推。
