rulebook: fai-f9a-b-2026
chapter: 球機規格
article_number: B.1
title: F9A-B 球機規格（20 公分）
summary: 球機（含飛行必要裝備、外框與電池）總重不得超過 300 g；球形防護外框直徑 20cm +2cm（須能放入 22cm 圓內），材質限塑膠或複合材料、禁止金屬，底部可平整以利立地。動力限電動馬達最多 4 顆；電池最高 4S、每電芯滿電不超過 4.25V（4S≤17V）。螺旋槳最大 3 吋（7.6cm）、禁用金屬槳。球機須配備 fail-safe（觸發即停馬達）；禁止自動定位／路徑修正系統，允許翻正（turtle）自復位。每位球員最多可備 2 台不裝電池的備用球機。
