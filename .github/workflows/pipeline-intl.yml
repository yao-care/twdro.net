name: Pipeline · 國際規則監控
on:
  schedule:
    - cron: '0 21 * * 1'   # 每週一 05:00 台北時間
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: '3.11'
          cache: pip
      # 規則監控只做指紋比對＋開 PR，不涉 CKIP → 用 dev 依賴（免裝 torch，快很多）。
      - run: pip install -r pipeline/requirements-dev.txt
      - name: FAI/FIDA 規則頁指紋變更監控
        run: python -m pipeline.run --source fai_fida_rules
      - name: 開 PR（若偵測到規則頁指紋變更）
        if: ${{ hashFiles('pipeline/state/pr-body.md') != '' }}
        uses: peter-evans/create-pull-request@v8
        with:
          branch: pipeline/intl
          title: '資料 pipeline：國際規則變更告警（人工比對）'
          body-path: pipeline/state/pr-body.md
          labels: |
            data-pipeline
            needs-review
          add-paths: |
            pipeline/state/intl-alerts/**
            pipeline/state/manifest.json
