name: Pipeline · 賽事公告
on:
  schedule:
    - cron: '30 20 * * *'   # 每日 04:30 台北時間
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: 快取 CKIP 模型
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ckip-model-v1
      - run: pip install -r pipeline/requirements.txt
      - name: 執行賽事公告 adapter（監看官方公告頁，擷取 draft 候選賽事）
        # 可用 repo 變數 EVENT_ANNOUNCEMENT_URLS（逗號分隔）覆寫監看清單。
        env:
          EVENT_ANNOUNCEMENT_URLS: ${{ vars.EVENT_ANNOUNCEMENT_URLS }}
        run: python -m pipeline.run --source event_announcements
      - name: 開 PR（若有候選變更）
        if: ${{ hashFiles('pipeline/state/pr-body.md') != '' }}
        uses: peter-evans/create-pull-request@v6
        with:
          branch: pipeline/events
          title: '資料 pipeline：賽事公告候選'
          body-path: pipeline/state/pr-body.md
          labels: |
            data-pipeline
            needs-review
          add-paths: |
            src/content/**
            pipeline/state/manifest.json
