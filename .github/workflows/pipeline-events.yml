name: Pipeline · 賽事公告
on:
  schedule:
    - cron: '30 20 * * *'   # 每日 04:30 台北時間
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: '3.11'
          cache: pip
      - name: 快取 CKIP 模型
        uses: actions/cache@v6
        with:
          path: ~/.cache/huggingface
          key: ckip-model-v1
      - run: pip install -r pipeline/requirements.txt
      - name: 執行賽事公告 adapter（監看官方公告頁，擷取 draft 候選賽事）
        # 可用 repo 變數 EVENT_ANNOUNCEMENT_URLS（逗號分隔）覆寫監看清單。
        env:
          EVENT_ANNOUNCEMENT_URLS: ${{ vars.EVENT_ANNOUNCEMENT_URLS }}
        run: python -m pipeline.run --source event_announcements

      # 未偵測到人名的賽事草稿 → 直接併 main 自動上站（站上以「草稿／未驗證」誠實標示）
      - name: 自動併乾淨草稿到 main
        run: bash pipeline/ci/auto-merge.sh "賽事草稿自動更新"

      # 偵測到疑似選手姓名的草稿 → 開 PR 給人審，收斂成隊伍層級後才 merge（護未成年個資）
      - name: 開 PR（僅人名警示候選，需人審）
        if: ${{ hashFiles('pipeline/state/pr-body.md') != '' }}
        uses: peter-evans/create-pull-request@v8
        with:
          branch: pipeline/events-review
          title: '資料 pipeline：賽事公告候選（⚠️ 疑含選手姓名，需人審）'
          body-path: pipeline/state/pr-body.md
          labels: |
            data-pipeline
            needs-review
            personal-data
          add-paths: |
            src/content/**
